name: Release Build

on:
  push:
    tags:
      - 'v*'

jobs:
  build-mac:
    name: Build macOS
    runs-on: macos-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'
          cache-dependency-path: './package-lock.json'

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Build libraries
        run: |
          npm run build:graphql-docs
          npm run build:bruno-query
          npm run build:bruno-common
          npm run sandbox:bundle-libraries --workspace=packages/bruno-js
          npm run build:bruno-converters
          npm run build:bruno-requests
          npm run build:schema-types
          npm run build:bruno-filestore

      - name: Build web
        run: npm run build:web

      - name: Prepare Electron build
        run: |
          rm -rf packages/bruno-electron/out packages/bruno-electron/web
          mkdir packages/bruno-electron/web
          cp -r packages/bruno-app/dist/* packages/bruno-electron/web
          sed -i '' 's@/static/@static/@g' packages/bruno-electron/web/*.html
          sed -i '' 's@/static/font@../../static/font@g' packages/bruno-electron/web/static/css/*.css
          find packages/bruno-electron/web -name '*.map' -type f -delete

      - name: Build Electron (macOS)
        working-directory: packages/bruno-electron
        run: |
          node -e "
            const config = require('./electron-builder-config.js');
            delete config.afterSign;
            config.mac.identity = null;
            require('fs').writeFileSync('./eb-config-ci.js', 'module.exports = ' + JSON.stringify(config, null, 2));
          "
          npx electron-builder --mac --config eb-config-ci.js --publish never
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: false

      - name: Upload macOS artifacts
        uses: actions/upload-artifact@v4
        with:
          name: macos-builds
          path: |
            packages/bruno-electron/out/*.dmg
            packages/bruno-electron/out/*.zip
            packages/bruno-electron/out/*.pkg
          retention-days: 30

  build-linux:
    name: Build Linux
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'
          cache-dependency-path: './package-lock.json'

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Build libraries
        run: |
          npm run build:graphql-docs
          npm run build:bruno-query
          npm run build:bruno-common
          npm run sandbox:bundle-libraries --workspace=packages/bruno-js
          npm run build:bruno-converters
          npm run build:bruno-requests
          npm run build:schema-types
          npm run build:bruno-filestore

      - name: Build web
        run: npm run build:web

      - name: Prepare Electron build
        run: |
          rm -rf packages/bruno-electron/out packages/bruno-electron/web
          mkdir packages/bruno-electron/web
          cp -r packages/bruno-app/dist/* packages/bruno-electron/web
          sed -i 's@/static/@static/@g' packages/bruno-electron/web/*.html
          sed -i 's@/static/font@../../static/font@g' packages/bruno-electron/web/static/css/*.css
          find packages/bruno-electron/web -name '*.map' -type f -delete

      - name: Build Electron (Linux)
        working-directory: packages/bruno-electron
        run: npx electron-builder --linux AppImage deb --config electron-builder-config.js --publish never

      - name: Upload Linux artifacts
        uses: actions/upload-artifact@v4
        with:
          name: linux-builds
          path: |
            packages/bruno-electron/out/*.AppImage
            packages/bruno-electron/out/*.deb
          retention-days: 30

  build-windows:
    name: Build Windows
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'
          cache-dependency-path: './package-lock.json'

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Build libraries
        shell: bash
        run: |
          npm run build:graphql-docs
          npm run build:bruno-query
          npm run build:bruno-common
          npm run sandbox:bundle-libraries --workspace=packages/bruno-js
          npm run build:bruno-converters
          npm run build:bruno-requests
          npm run build:schema-types
          npm run build:bruno-filestore

      - name: Build web
        run: npm run build:web

      - name: Prepare Electron build
        shell: bash
        run: |
          rm -rf packages/bruno-electron/out packages/bruno-electron/web
          mkdir packages/bruno-electron/web
          cp -r packages/bruno-app/dist/* packages/bruno-electron/web
          sed -i 's@/static/@static/@g' packages/bruno-electron/web/*.html
          sed -i 's@/static/font@../../static/font@g' packages/bruno-electron/web/static/css/*.css
          find packages/bruno-electron/web -name '*.map' -type f -delete

      - name: Build Electron (Windows)
        working-directory: packages/bruno-electron
        run: npx electron-builder --win --config electron-builder-config.js --publish never

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-builds
          path: packages/bruno-electron/out/*.exe
          retention-days: 30

  create-release:
    name: Create GitHub Release
    needs: [build-mac, build-linux, build-windows]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6

      - name: Download macOS artifacts
        uses: actions/download-artifact@v4
        with:
          name: macos-builds
          path: artifacts/mac

      - name: Download Linux artifacts
        uses: actions/download-artifact@v4
        with:
          name: linux-builds
          path: artifacts/linux

      - name: Download Windows artifacts
        uses: actions/download-artifact@v4
        with:
          name: windows-builds
          path: artifacts/windows

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            artifacts/mac/*
            artifacts/linux/*
            artifacts/windows/*
